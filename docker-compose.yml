services:
  db:
    image: postgres:16
    container_name: jotpop-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - jotpop_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: jotpop-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ./backend/app:/app/app
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: jotpop-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  jotpop_postgres_data:
  frontend_node_modules:
